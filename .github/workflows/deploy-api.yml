name: Deploy Headless API to Google Cloud Run

on:
  push:
    branches:
      - 'main'
    paths:
      - 'headless-api/**'
      - 'frontend/**'
      - 'packages/shared-utils/**'
      - '.github/workflows/deploy-api.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: 'us-central1'
  SERVICE_NAME: 'headless-api'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install
      - name: Build Frontend
        run: pnpm --filter frontend... build
        env:
          VITE_ORG_NAME: ${{ vars.VITE_ORG_NAME }}
          VITE_ORG_WEBSITE: ${{ vars.VITE_ORG_WEBSITE }}
          VITE_OFFICE_PHONE_OPTIONS: ${{ vars.VITE_OFFICE_PHONE_OPTIONS }}
          BACKEND_DOMAIN: ${{ vars.BACKEND_DOMAIN }}
          VITE_LOGOS_CONFIG: ${{ vars.VITE_LOGOS_CONFIG }}
          VITE_PRESETS_CONFIG: ${{ vars.VITE_PRESETS_CONFIG }}
          FRONTEND_DOMAIN: ${{ vars.FRONTEND_DOMAIN }}
      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./headless-api/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}-repo/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          # Reverted to use SERVICE_NAME-repo
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}-repo/${{ env.SERVICE_NAME }}:latest
